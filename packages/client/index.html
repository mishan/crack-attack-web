<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crack Attack!</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0b0d12;
        color: #d7dce5;
        font-family: system-ui, sans-serif;
        overflow: hidden;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
      }
      #hud {
        position: fixed;
        top: 12px;
        left: 12px;
        font-variant-numeric: tabular-nums;
        font-size: 13px;
        line-height: 1.5;
        opacity: 0.85;
        pointer-events: none;
        white-space: pre;
      }
      #help {
        position: fixed;
        bottom: 12px;
        left: 12px;
        font-size: 12px;
        opacity: 0.6;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud"></div>
    <div id="help">
      ←→↑↓ move &nbsp;·&nbsp; Z / Space swap &nbsp;·&nbsp; X raise &nbsp;·&nbsp; R restart
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
